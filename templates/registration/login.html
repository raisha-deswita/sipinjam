{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="description" content="Login Sistem Peminjaman">
	<meta name="author" content="AdminKit">

	<title>Login | SIPINJAM</title>

    <link href="{% static 'css/app.css' %}" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
	<main class="d-flex w-100">
		<div class="container d-flex flex-column">
			<div class="row vh-100">
				<div class="col-sm-10 col-md-8 col-lg-6 col-xl-5 mx-auto d-table h-100">
					<div class="d-table-cell align-middle">

						<div class="text-center mt-4">
							<h1 class="h2">Selamat Datang! 👋</h1>
							<p class="lead">
								Silakan login untuk mengakses sistem inventaris.
							</p>
						</div>

						<div class="card">
							<div class="card-body">
								<div class="m-sm-3">
                                    
                                    {% if form.errors %}
                                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                            <div class="alert-message">
                                                <strong>Login Gagal!</strong> Username atau password salah.
                                            </div>
                                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                        </div>
                                    {% endif %}

                                    <form method="post">
                                        {% csrf_token %}
                                        
                                        <div class="mb-3">
											<label class="form-label">Username</label>
											<input class="form-control form-control-lg" 
                                                   type="text" 
                                                   name="username" 
                                                   placeholder="Masukkan username kamu" 
                                                   required />
										</div>

                                        <div class="mb-3">
											<label class="form-label">Password</label>
											<input class="form-control form-control-lg" 
                                                   type="password" 
                                                   name="password" 
                                                   placeholder="Masukkan password" 
                                                   required />
										</div>

                                        <div>
											<div class="form-check align-items-center">
												<input id="customControlInline" type="checkbox" class="form-check-input" value="remember-me" name="remember-me" checked>
												<label class="form-check-label text-small" for="customControlInline">Ingat saya</label>
											</div>
										</div>

                                        <div class="d-grid gap-2 mt-3">
											<button type="submit" class="btn btn-lg btn-primary">Masuk Sekarang</button>
										</div>
									</form>

								</div>
							</div>
						</div>

					</div>
				</div>
			</div>
		</div>
	</main>

	<script src="{% static 'js/app.js' %}"></script>

</body>

</html>
